name: Update Sitemap Date

on:
  push:
    branches: [main]

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update lastmod dates
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>$TODAY<\/lastmod>/g" sitemap.xml
          echo "Updated sitemap lastmod to $TODAY"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update sitemap lastmod to $(date -u +%Y-%m-%d)"
          git push
